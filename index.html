<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineRate — Rate Every Movie</title>
  <meta name="description" content="Sign in and rate any movie. Powered by TMDB & Supabase." />
  <link rel="preconnect" href="https://image.tmdb.org" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ============ TOP BAR ============ -->
  <header id="topbar" class="topbar hidden">
    <div class="topbar-inner">
      <a class="brand" href="#" id="brandHome">
        <span class="brand-mark">★</span> CineRate
      </a>
      <form id="searchForm" class="search">
        <input id="searchInput" type="search" placeholder="Search any movie…" autocomplete="off" />
      </form>
      <div class="user-menu">
        <span id="userName" class="user-name"></span>
        <button id="myRatingsBtn" class="btn btn-ghost">My ratings</button>
        <button id="signOutBtn" class="btn btn-ghost">Sign out</button>
      </div>
    </div>
  </header>

  <!-- ============ AUTH GATE ============ -->
  <main id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-hero">
        <span class="brand-mark big">★</span>
        <h1>CineRate</h1>
        <p>Rate every movie ever made. Sign in to start.</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin">Sign in</button>
        <button class="auth-tab" data-tab="signup">Sign up</button>
      </div>

      <!-- Sign in -->
      <form id="signinForm" class="auth-form">
        <input type="email" id="signinEmail" placeholder="Email" required />
        <input type="password" id="signinPassword" placeholder="Password" required />
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>

      <!-- Sign up -->
      <form id="signupForm" class="auth-form hidden">
        <input type="text" id="signupName" placeholder="Display name" required maxlength="40" />
        <input type="email" id="signupEmail" placeholder="Email" required />
        <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required minlength="6" />
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>

      <p id="authMsg" class="auth-msg"></p>
      <p id="configWarn" class="config-warn hidden"></p>
    </div>
  </main>

  <!-- ============ APP ============ -->
  <main id="app" class="app hidden">
    <section id="appHeader" class="section-head">
      <h2 id="sectionTitle">Popular right now</h2>
    </section>
    <div id="grid" class="grid"></div>
    <div id="gridStatus" class="grid-status"></div>
    <button id="loadMore" class="btn btn-ghost load-more hidden">Load more</button>
  </main>

  <!-- ============ MOVIE DETAIL MODAL ============ -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel">
      <button class="modal-close" data-close>✕</button>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
