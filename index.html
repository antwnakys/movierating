<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineRate — Rate Every Movie</title>
  <meta name="description" content="Sign in and rate any movie. Powered by TMDB & Supabase." />
  <link rel="preconnect" href="https://image.tmdb.org" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ============ DEVICE WELCOME ============ -->
  <div id="deviceScreen" class="device-screen hidden">
    <div class="device-card">
      <span class="brand-mark big">★</span>
      <h1>Welcome to CineRate</h1>
      <p>How are you browsing? We'll tailor the layout to your screen.</p>
      <div class="device-options">
        <button class="device-opt" data-device="mobile">
          <span class="device-emoji">📱</span>
          <span class="device-label">I'm on mobile</span>
          <span class="device-rec" id="recMobile"></span>
        </button>
        <button class="device-opt" data-device="desktop">
          <span class="device-emoji">💻</span>
          <span class="device-label">I'm on a computer</span>
          <span class="device-rec" id="recDesktop"></span>
        </button>
      </div>
      <p class="device-note">You can switch anytime from the menu.</p>
    </div>
  </div>

  <!-- ============ TOP BAR ============ -->
  <header id="topbar" class="topbar hidden">
    <div class="topbar-inner">
      <a class="brand" href="#" id="brandHome">
        <span class="brand-mark">★</span> CineRate
      </a>
      <form id="searchForm" class="search">
        <input id="searchInput" type="search" placeholder="Search movies & people…" autocomplete="off" />
      </form>
      <button id="navToggle" class="nav-toggle" aria-label="Menu">☰</button>
      <div class="user-menu" id="navMenu">
        <span id="userName" class="user-name"></span>
        <button id="profileBtn" class="btn btn-ghost">My profile</button>
        <button id="activityBtn" class="btn btn-ghost">Activity</button>
        <button id="watchlistBtn" class="btn btn-ghost">Watchlist</button>
        <button id="myRatingsBtn" class="btn btn-ghost">My ratings</button>
        <button id="signOutBtn" class="btn btn-ghost">Sign out</button>
        <button id="viewToggle" class="btn btn-ghost"></button>
        <input type="file" id="avatarInput" accept="image/*" class="hidden" />
      </div>
    </div>
  </header>

  <!-- ============ AUTH GATE ============ -->
  <main id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-hero">
        <span class="brand-mark big">★</span>
        <h1>CineRate</h1>
        <p>Rate every movie ever made. Sign in to start.</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin">Sign in</button>
        <button class="auth-tab" data-tab="signup">Sign up</button>
      </div>

      <!-- Sign in -->
      <form id="signinForm" class="auth-form">
        <input type="email" id="signinEmail" placeholder="Email" required />
        <input type="password" id="signinPassword" placeholder="Password" required />
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>

      <!-- Sign up -->
      <form id="signupForm" class="auth-form hidden">
        <input type="text" id="signupName" placeholder="Display name" required maxlength="40" />
        <input type="email" id="signupEmail" placeholder="Email" required />
        <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required minlength="6" />
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>

      <p id="authMsg" class="auth-msg"></p>
      <p id="configWarn" class="config-warn hidden"></p>
    </div>
  </main>

  <!-- ============ APP ============ -->
  <main id="app" class="app hidden">
    <div id="browseView">
      <section id="appHeader" class="section-head">
        <h2 id="sectionTitle">Popular right now</h2>
      </section>
      <div id="peopleResults" class="people-results"></div>
      <div id="grid" class="grid"></div>
      <div id="gridStatus" class="grid-status"></div>
      <button id="loadMore" class="btn btn-ghost load-more hidden">Load more</button>
    </div>
    <div id="profileView" class="hidden"></div>
  </main>

  <!-- ============ MOVIE DETAIL MODAL ============ -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel">
      <button class="modal-close" data-close>✕</button>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
